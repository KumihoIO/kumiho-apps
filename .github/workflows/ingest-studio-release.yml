name: ingest-studio release

# Builds and releases the Kumiho Ingest Studio (Tauri) desktop app for Windows,
# macOS and Linux, and publishes a GitHub Release on this repo.
#
# Trigger: push a tag like `ingest-studio-v0.1.0`.
#
# Signing / updates are conditional on repo secrets:
#   Windows      : WINDOWS_CERT_BASE64 + WINDOWS_CERT_PASSWORD (Authenticode .pfx)
#   Auto-update  : TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD) - required to produce
#                  signed update artifacts + latest.json. To enable: generate a
#                  keypair (`npx @tauri-apps/cli signer generate`), put the public
#                  key in src-tauri/tauri.conf.json (plugins.updater.pubkey), set
#                  bundle.createUpdaterArtifacts to true, and add the secrets.
#   Firebase     : VITE_FIREBASE_* (public web config, injected into the UI build)

on:
  push:
    tags:
      - 'ingest-studio-v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ingest/apps/ingest-studio-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ingest/apps/desktop-tauri/src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Install UI dependencies
        working-directory: ingest/apps/ingest-studio-ui
        run: npm ci

      - name: Build UI
        working-directory: ingest/apps/ingest-studio-ui
        run: npm run build

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        working-directory: ingest/apps/desktop-tauri/src-tauri
        run: cargo tauri build --ci

      - name: Sign Windows installers
        if: runner.os == 'Windows' && env.WINDOWS_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' |
            Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found" }
          $bundle = "ingest/apps/desktop-tauri/src-tauri/target/release/bundle"
          Get-ChildItem -Path "$bundle/nsis","$bundle/msi" -Include *.exe,*.msi -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            & $signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $($_.Name)" }
          }
          Remove-Item $pfx -Force

      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ingest-studio-${{ matrix.os }}
          path: |
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/msi/*.msi
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 14

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/ingest-studio-v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/msi/*.msi
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
            ingest/apps/desktop-tauri/src-tauri/target/release/bundle/**/latest.json
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
