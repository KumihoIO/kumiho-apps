name: tauri-build

on:
  push:
    tags:
      - "*.*.*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/ingest-studio-ui/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop-tauri/src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install UI dependencies
        working-directory: apps/ingest-studio-ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: apps/ingest-studio-ui
        run: pnpm run build

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Ensure Tauri icons exist
        shell: bash
        run: |
          python - <<'PY'
          import os
          import struct
          import binascii
          import zlib

          icons_dir = os.path.join("apps", "desktop-tauri", "src-tauri", "icons")
          os.makedirs(icons_dir, exist_ok=True)

          png_path = os.path.join(icons_dir, "icon.png")
          ico_path = os.path.join(icons_dir, "icon.ico")
          icns_path = os.path.join(icons_dir, "icon.icns")

          def chunk(tag: bytes, data: bytes) -> bytes:
            return (
              struct.pack("!I", len(data))
              + tag
              + data
              + struct.pack("!I", binascii.crc32(tag + data) & 0xFFFFFFFF)
            )

          def build_png(width: int, height: int) -> bytes:
            rgba = b"\x22\x22\x22\xff"  # dark gray + alpha
            row = b"\x00" + rgba * width  # filter 0 + RGBA pixels
            raw = row * height
            compressed = zlib.compress(raw, 9)
            ihdr = struct.pack("!IIBBBBB", width, height, 8, 6, 0, 0, 0)
            return (
              b"\x89PNG\r\n\x1a\n"
              + chunk(b"IHDR", ihdr)
              + chunk(b"IDAT", compressed)
              + chunk(b"IEND", b"")
            )

          def read_png_info(path: str):
            try:
              with open(path, "rb") as f:
                data = f.read()
            except FileNotFoundError:
              return None, None
            if len(data) < 33 or data[:8] != b"\x89PNG\r\n\x1a\n":
              return None, None
            if data[12:16] != b"IHDR":
              return None, None
            width, height, bit_depth, color_type, *_ = struct.unpack("!IIBBBBB", data[16:29])
            return data, (width, height, bit_depth, color_type)

          def ensure_png(path: str, width: int, height: int):
            data, info = read_png_info(path)
            if info:
              w, h, _, color_type = info
              if w == h and color_type == 6:
                return data, info, "kept"
            data = build_png(width, height)
            with open(path, "wb") as f:
              f.write(data)
            return data, (width, height, 8, 6), "generated"

          def ico_has_256(path: str) -> bool:
            try:
              with open(path, "rb") as f:
                data = f.read()
            except FileNotFoundError:
              return False
            if len(data) < 6 or data[:4] != b"\x00\x00\x01\x00":
              return False
            count = struct.unpack("<H", data[4:6])[0]
            if len(data) < 6 + count * 16:
              return False
            for i in range(count):
              entry = data[6 + i * 16 : 6 + (i + 1) * 16]
              if entry[0] == 0 and entry[1] == 0:
                return True
            return False

          def ensure_ico(path: str, png_bytes: bytes):
            if ico_has_256(path):
              return "kept"
            header = struct.pack("<HHH", 0, 1, 1)
            entry = struct.pack("<BBBBHHII", 0, 0, 0, 0, 1, 32, len(png_bytes), 6 + 16)
            with open(path, "wb") as f:
              f.write(header + entry + png_bytes)
            return "generated"

          def ensure_icns(path: str, png_bytes: bytes, size: int):
            try:
              with open(path, "rb") as f:
                header = f.read(4)
            except FileNotFoundError:
              header = b""
            if header == b"icns":
              return "kept"
            chunk_type = {128: b"ic07", 256: b"ic08", 512: b"ic09", 1024: b"ic10"}.get(size, b"ic09")
            chunk_len = 8 + len(png_bytes)
            total_len = 8 + chunk_len
            icns = b"icns" + struct.pack(">I", total_len) + chunk_type + struct.pack(">I", chunk_len) + png_bytes
            with open(path, "wb") as f:
              f.write(icns)
            return "generated"

          png_bytes, png_info, png_status = ensure_png(png_path, 512, 512)
          ico_status = ensure_ico(ico_path, build_png(256, 256))
          icns_size = png_info[0] if png_info else 512
          icns_status = ensure_icns(icns_path, png_bytes, icns_size)

          print(f"icon.png: {png_status}")
          print(f"icon.ico: {ico_status}")
          print(f"icon.icns: {icns_status}")
          PY

      - name: Build Tauri app
        working-directory: apps/desktop-tauri/src-tauri
        run: cargo tauri build --ci

      - name: Create bundle zip
        shell: bash
        run: |
          python - <<'PY'
          import os
          import zipfile

          bundle_dir = os.path.join("apps", "desktop-tauri", "src-tauri", "target", "release", "bundle")
          if not os.path.isdir(bundle_dir):
            raise SystemExit(f"Missing bundle directory: {bundle_dir}")

          runner_os = os.environ.get("RUNNER_OS", "unknown").lower()
          zip_name = f"kumiho-ingest-{runner_os}.zip"
          zip_path = os.path.join(bundle_dir, zip_name)

          files = []
          for root, _, filenames in os.walk(bundle_dir):
            for filename in filenames:
              full_path = os.path.join(root, filename)
              if os.path.abspath(full_path) == os.path.abspath(zip_path):
                continue
              files.append(full_path)

          if not files:
            raise SystemExit("No bundle files found to zip.")

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
            for full_path in files:
              rel_path = os.path.relpath(full_path, bundle_dir)
              zf.write(full_path, rel_path)

          print(f"Created {zip_path} with {len(files)} files.")
          PY

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: apps/desktop-tauri/src-tauri/target/release/bundle/*.zip
          if-no-files-found: error

      - name: Upload bundles to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop-tauri/src-tauri/target/release/bundle/*.zip
          fail_on_unmatched_files: true
